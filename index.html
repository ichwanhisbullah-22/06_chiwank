<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Menu Interaktif</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    /* MENU */
    #menu {
      display: flex;
      gap: 15px;
      list-style: none;
      padding: 0;
    }

    #menu li {
      background: #ddd;
      padding: 8px 12px;
      cursor: pointer;
    }

    #menu li:hover {
      background: #bbb;
    }

    /* ACTIVE MENU */
    .active {
      background: #999 !important;
      color: white;
    }

    /* CONTENT */
    .content {
      display: none;
      margin-top: 20px;
    }

    .show {
      display: block;
    }

    /* TABLE */
    table {
      border-collapse: collapse;
      margin-top: 10px;
    }

    table, th, td {
      border: 1px solid black;
      padding: 8px;
    }

    /* CARD */
    #card {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .card-item {
      border: 1px solid black;
      padding: 10px;
      width: 100px;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- MENU -->
  <ul id="menu"></ul>

  <!-- HOME -->
  <div id="home" class="content">
    <h2>Home</h2>
    <p>Selamat datang di aplikasi sederhana.</p>
  </div>

  <!-- DATA -->
  <div id="data" class="content">
    <h2>Data</h2>

    <input type="text" id="namaInput" placeholder="Masukkan nama">
    <button onclick="tambahData()">Tambah</button>

    <h3>Table</h3>
    <table>
      <tbody id="tableBody"></tbody>
    </table>

    <h3>List</h3>
    <ul id="list"></ul>

    <h3>Card</h3>
    <div id="card"></div>
  </div>

  <!-- ABOUT -->
  <div id="about" class="content">
    <h2>About</h2>
    <p>Ini contoh project render data menggunakan JavaScript.</p>
  </div>

  <script>
    // =====================
    // DATA
    // =====================
    let users = [
      { id: 1, nama: "Sari" },
      { id: 2, nama: "Dina" },
      { id: 3, nama: "Tina" }
    ];

    const menus = ["home", "data", "about"];

    // =====================
    // RENDER MENU
    // =====================
    function renderMenu(data) {
      let html = "";

      for (let i = 0; i < data.length; i++) {
        html += `<li onclick="showPage('${data[i]}')" id="menu-${data[i]}">${data[i]}</li>`;
      }

      document.getElementById("menu").innerHTML = html;
    }

    // =====================
    // SHOW PAGE
    // =====================
    function showPage(page) {
      const contents = document.getElementsByClassName("content");
      for (let i = 0; i < contents.length; i++) {
        contents[i].classList.remove("show");
      }

      document.getElementById(page).classList.add("show");

      // aktif menu
      for (let i = 0; i < menus.length; i++) {
        document.getElementById("menu-" + menus[i]).classList.remove("active");
      }

      document.getElementById("menu-" + page).classList.add("active");
    }

    // =====================
    // RENDER DATA
    // =====================
    function renderAll() {
      renderTable(users);
      renderList(users);
      renderCard(users);
    }

    function renderTable(data) {
      let html = "";
      for (let i = 0; i < data.length; i++) {
        html += `
          <tr>
            <td>${data[i].id}</td>
            <td>${data[i].nama}</td>
          </tr>
        `;
      }
      document.getElementById("tableBody").innerHTML = html;
    }

    function renderList(data) {
      let html = "";
      for (let i = 0; i < data.length; i++) {
        html += `<li>${data[i].nama}</li>`;
      }
      document.getElementById("list").innerHTML = html;
    }

    function renderCard(data) {
      let html = "";
      for (let i = 0; i < data.length; i++) {
        html += `
          <div class="card-item">
            <p>${data[i].nama}</p>
          </div>
        `;
      }
      document.getElementById("card").innerHTML = html;
    }

    // =====================
    // TAMBAH DATA
    // =====================
    function tambahData() {
      const nama = document.getElementById("namaInput").value;

      if (nama === "") {
        alert("Nama tidak boleh kosong!");
        return;
      }

      users.push({
        id: users.length + 1,
        nama: nama
      });

      document.getElementById("namaInput").value = "";

      renderAll();
    }

    // =====================
    // INIT
    // =====================
    renderMenu(menus);
    renderAll();
    showPage("home"); // default halaman awal
  </script>

</body>
</html>
