<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Render Data</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    table {
      border-collapse: collapse;
      margin-bottom: 20px;
    }

    table, th, td {
      border: 1px solid black;
      padding: 8px;
    }

    #card {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .card-item {
      border: 1px solid black;
      padding: 10px;
      width: 100px;
      text-align: center;
    }
  </style>
</head>
<body>

  <h3>Table</h3>
  <table>
    <tbody id="tableBody"></tbody>
  </table>

  <h3>List</h3>
  <ul id="list"></ul>

  <h3>Card</h3>
  <div id="card"></div>

  <script>
    // DATA (JSON / ARRAY)
    const users = [
      { id: 1, nama: "Sari" },
      { id: 2, nama: "Dina" },
      { id: 3, nama: "Tina" }
    ];

    // TABLE
    function renderTable(data) {
      let html = "";
      for (let i = 0; i < data.length; i++) {
        html += `
          <tr>
            <td>${data[i].id}</td>
            <td>${data[i].nama}</td>
          </tr>
        `;
      }
      document.getElementById("tableBody").innerHTML = html;
    }

    // LIST (INI YANG KURANG)
    function renderList(data) {
      let html = "";
      for (let i = 0; i < data.length; i++) {
        html += `<li>${data[i].nama}</li>`;
      }
      document.getElementById("list").innerHTML = html;
    }

    // CARD
    function renderCard(data) {
      let html = "";
      for (let i = 0; i < data.length; i++) {
        html += `
          <div class="card-item">
            <p>${data[i].nama}</p>
          </div>
        `;
      }
      document.getElementById("card").innerHTML = html;
    }

    // JALANKAN
    renderTable(users);
    renderList(users); // ⬅️ tambahan penting
    renderCard(users);

  </script>

</body>
</html>
