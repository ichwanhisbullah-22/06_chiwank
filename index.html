<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Render Data</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    table {
      border-collapse: collapse;
      margin-bottom: 30px;
      width: 300px;
    }

    table, th, td {
      border: 1px solid black;
      padding: 8px;
    }

    #card {
      display: flex;
      gap: 10px;
    }

    .card-item {
      border: 1px solid black;
      padding: 10px;
      width: 100px;
      text-align: center;
    }
  </style>
</head>
<body>

  <h2>Table Data</h2>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Nama</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <h2>Card Data</h2>
  <div id="card"></div>

  <script>
    // =====================
    // DATA (ARRAY)
    // =====================
    const users = [
      { id: 1, nama: "Sari" },
      { id: 2, nama: "Dina" },
      { id: 3, nama: "Tina" }
    ];

    // =====================
    // RENDER TABLE
    // =====================
    function renderTable(data) {
      let html = "";

      for (let i = 0; i < data.length; i++) {
        html += `
          <tr>
            <td>${data[i].id}</td>
            <td>${data[i].nama}</td>
          </tr>
        `;
      }

      document.getElementById("tableBody").innerHTML = html;
    }

    // =====================
    // RENDER CARD
    // =====================
    function renderCard(data) {
      let html = "";

      for (let i = 0; i < data.length; i++) {
        html += `
          <div class="card-item">
            <p>ID: ${data[i].id}</p>
            <p>${data[i].nama}</p>
          </div>
        `;
      }

      document.getElementById("card").innerHTML = html;
    }

    // =====================
    // JALANKAN
    // =====================
    renderTable(users);
    renderCard(users);

  </script>

</body>
</html>
