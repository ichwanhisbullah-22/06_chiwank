<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Render Data</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    input, button {
      padding: 8px;
      margin: 5px;
    }

    table {
      border-collapse: collapse;
      margin-top: 20px;
    }

    table, th, td {
      border: 1px solid black;
      padding: 8px;
    }

    #card {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .card-item {
      border: 1px solid black;
      padding: 10px;
      width: 100px;
      text-align: center;
    }
  </style>
</head>
<body>

  <h3>Tambah Data</h3>
  <input type="text" id="namaInput" placeholder="Masukkan nama">
  <button onclick="tambahData()">Tambah</button>

  <h3>Table</h3>
  <table>
    <tbody id="tableBody"></tbody>
  </table>

  <h3>List</h3>
  <ul id="list"></ul>

  <h3>Card</h3>
  <div id="card"></div>

  <script>
    // =====================
    // DATA
    // =====================
    let users = [
      { id: 1, nama: "Sari" },
      { id: 2, nama: "Dina" },
      { id: 3, nama: "Tina" }
    ];

    // =====================
    // RENDER SEMUA (DRY)
    // =====================
    function renderAll() {
      renderTable(users);
      renderList(users);
      renderCard(users);
    }

    // =====================
    // TABLE
    // =====================
    function renderTable(data) {
      let html = "";
      for (let i = 0; i < data.length; i++) {
        html += `
          <tr>
            <td>${data[i].id}</td>
            <td>${data[i].nama}</td>
          </tr>
        `;
      }
      document.getElementById("tableBody").innerHTML = html;
    }

    // =====================
    // LIST
    // =====================
    function renderList(data) {
      let html = "";
      for (let i = 0; i < data.length; i++) {
        html += `<li>${data[i].nama}</li>`;
      }
      document.getElementById("list").innerHTML = html;
    }

    // =====================
    // CARD
    // =====================
    function renderCard(data) {
      let html = "";
      for (let i = 0; i < data.length; i++) {
        html += `
          <div class="card-item">
            <p>${data[i].nama}</p>
          </div>
        `;
      }
      document.getElementById("card").innerHTML = html;
    }

    // =====================
    // TAMBAH DATA (FITUR BARU)
    // =====================
    function tambahData() {
      const nama = document.getElementById("namaInput").value;

      if (nama === "") {
        alert("Nama tidak boleh kosong!");
        return;
      }

      const newUser = {
        id: users.length + 1,
        nama: nama
      };

      users.push(newUser);

      document.getElementById("namaInput").value = "";

      renderAll(); // update semua tampilan
    }

    // =====================
    // INIT
    // =====================
    renderAll();

  </script>

</body>
</html>
